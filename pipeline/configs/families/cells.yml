family: cells
display_name: Aspose.Cells for .NET
enabled: true
status: active

nuget:
  package_id: Aspose.Cells
  version_policy: latest-stable
  pinned_version: null
  allow_prerelease: false
  target_framework_preference:
    - netstandard2.0
    - netstandard2.1
    - net8.0
    - net6.0
    - net48
  dependency_resolution:
    enabled: true
    max_depth: 2

plugin_detection:
  namespace_patterns:
    - Aspose.Cells.LowCode
    - Aspose.Cells.LowCode.*
    - Aspose.Cells.Plugins
    - Aspose.Cells.Plugins.*

github:
  official_examples_repo:
    owner: aspose-cells
    repo: Aspose.Cells-for-.NET
    branch: master

  published_plugin_examples_repo:
    owner: aspose
    repo: aspose-plugins-examples-dotnet
    branch: main

fixtures:
  sources:
    - type: github
      owner: aspose-cells
      repo: Aspose.Cells-for-.NET
      branch: master
      paths:
        - Examples/Data

existing_examples:
  sources:
    - type: github
      owner: aspose-cells
      repo: Aspose.Cells-for-.NET
      branch: master
      paths:
        - Examples/CSharp

generation:
  min_examples_per_family: 3
  max_examples_per_monthly_run: 10
  allow_new_fixtures: true
  allow_generated_input_files: true

validation:
  require_restore: true
  require_build: true
  require_run: true
  require_output_validation: true
  require_example_reviewer: true
  runtime_runner: auto

llm:
  provider_order:
    - gpt_oss
    - openai
    - llm_professionalize
    - ollama

template_hints:
  default_input_extension: ".xlsx"
  default_input_filename: "input.xlsx"
  array_input_filenames: ["input1.xlsx", "input2.xlsx"]
  input_creation_lines:
    - 'var workbook = new Workbook();'
    - 'workbook.Worksheets[0].Cells["A1"].PutValue("Hello World");'
    - 'workbook.Save("input.xlsx");'
  merger_input_creation_lines:
    - 'var wb1 = new Workbook();'
    - 'wb1.Worksheets[0].Cells["A1"].PutValue("Sheet1");'
    - 'wb1.Save("input1.xlsx");'
    - 'var wb2 = new Workbook();'
    - 'wb2.Worksheets[0].Cells["A1"].PutValue("Sheet2");'
    - 'wb2.Save("input2.xlsx");'
  additional_usings:
    - "Aspose.Cells"
  default_output_extension: ".xlsx"
  default_fixture_extension: ".xlsx"

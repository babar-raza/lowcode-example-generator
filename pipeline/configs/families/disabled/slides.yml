family: slides
display_name: Aspose.Slides for .NET
enabled: true
status: experimental

nuget:
  package_id: Aspose.Slides.NET
  version_policy: latest-stable
  pinned_version: null
  allow_prerelease: false
  target_framework_preference:
    - netstandard2.0
    - netstandard2.1
    - net8.0
    - net6.0
    - net48
  dependency_resolution:
    enabled: true
    max_depth: 2

plugin_detection:
  namespace_patterns:
    - Aspose.Slides.LowCode
    - Aspose.Slides.LowCode.*

github:
  official_examples_repo:
    owner: aspose-slides
    repo: Aspose.Slides-for-.NET
    branch: master

  published_plugin_examples_repo:
    owner: aspose
    repo: aspose-plugins-examples-dotnet
    branch: main

fixtures:
  sources:
    - type: github
      owner: aspose-slides
      repo: Aspose.Slides-for-.NET
      branch: master
      paths:
        - Examples/Data

existing_examples:
  sources:
    - type: github
      owner: aspose-slides
      repo: Aspose.Slides-for-.NET
      branch: master
      paths:
        - Examples/CSharp

generation:
  min_examples_per_family: 3
  max_examples_per_monthly_run: 10
  allow_new_fixtures: true
  allow_generated_input_files: true

validation:
  require_restore: true
  require_build: true
  require_run: true
  require_output_validation: true
  require_example_reviewer: true
  runtime_runner: auto

llm:
  provider_order:
    - llm_professionalize
    - ollama

template_hints:
  default_input_extension: ".pptx"
  default_input_filename: "input.pptx"
  array_input_filenames: ["input1.pptx", "input2.pptx"]
  input_creation_lines:
    - 'var pres = new Presentation();'
    - 'pres.Save("input.pptx", SaveFormat.Pptx);'
  merger_input_creation_lines:
    - 'var pres1 = new Presentation();'
    - 'pres1.Save("input1.pptx", SaveFormat.Pptx);'
    - 'var pres2 = new Presentation();'
    - 'pres2.Save("input2.pptx", SaveFormat.Pptx);'
  additional_usings:
    - "Aspose.Slides"
    - "Aspose.Slides.Export"
  default_output_extension: ".pptx"
  default_fixture_extension: ".pptx"

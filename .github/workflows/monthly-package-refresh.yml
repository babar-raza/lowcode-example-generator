name: Monthly Package Refresh

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of each month at 06:00 UTC
  workflow_dispatch:
    inputs:
      family:
        description: "Family to refresh (leave empty for all active)"
        required: false
        type: string
      dry_run:
        description: "Dry-run mode"
        required: false
        default: true
        type: boolean

jobs:
  refresh:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build DllReflector
        run: dotnet build tools/DllReflector/DllReflector.csproj -c Release

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m plugin_examples run --family ${{ inputs.family || 'cells' }} ${{ inputs.dry_run && '--dry-run' || '' }}

family: pdf
display_name: Aspose.PDF for .NET
enabled: true
status: discovery_only

nuget:
  package_id: Aspose.PDF
  version_policy: latest-stable
  pinned_version: null
  allow_prerelease: false
  target_framework_preference:
    - netstandard2.0
    - netstandard2.1
    - net8.0
    - net6.0
    - net48
  dependency_resolution:
    enabled: true
    max_depth: 2

plugin_detection:
  namespace_patterns:
    - Aspose.Pdf.LowCode
    - Aspose.Pdf.LowCode.*

github:
  official_examples_repo:
    owner: aspose-pdf
    repo: Aspose.PDF-for-.NET
    branch: master

  published_plugin_examples_repo:
    owner: aspose
    repo: aspose-plugins-examples-dotnet
    branch: main

fixtures:
  sources:
    - type: github
      owner: aspose-pdf
      repo: Aspose.PDF-for-.NET
      branch: master
      paths:
        - Examples/Data

existing_examples:
  sources:
    - type: github
      owner: aspose-pdf
      repo: Aspose.PDF-for-.NET
      branch: master
      paths:
        - Examples/CSharp

generation:
  min_examples_per_family: 3
  max_examples_per_monthly_run: 10
  allow_new_fixtures: true
  allow_generated_input_files: true

validation:
  require_restore: true
  require_build: true
  require_run: true
  require_output_validation: true
  require_example_reviewer: true
  runtime_runner: auto

llm:
  provider_order:
    - llm_professionalize
    - ollama

template_hints:
  default_input_extension: ".pdf"
  default_input_filename: "input.pdf"
  array_input_filenames: ["input1.pdf", "input2.pdf"]
  input_creation_lines:
    - 'var doc = new Aspose.Pdf.Document();'
    - 'doc.Pages.Add();'
    - 'doc.Save("input.pdf");'
  merger_input_creation_lines:
    - 'var doc1 = new Aspose.Pdf.Document();'
    - 'doc1.Pages.Add();'
    - 'doc1.Save("input1.pdf");'
    - 'var doc2 = new Aspose.Pdf.Document();'
    - 'doc2.Pages.Add();'
    - 'doc2.Save("input2.pdf");'
  additional_usings:
    - "Aspose.Pdf"
  default_output_extension: ".pdf"
  default_fixture_extension: ".pdf"
